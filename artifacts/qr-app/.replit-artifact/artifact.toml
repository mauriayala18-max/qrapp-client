kind = "mobile"
previewPath = "/"
title = "QR App"
version = "1.0.0"
id = "artifacts/qr-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18754

[services.development]
run = "pnpm --filter @workspace/qr-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qr-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/qr-app", "run", "serve" ]

[services.env]
PORT = "18754"
BASE_PATH = "/"
